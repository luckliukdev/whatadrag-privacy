name: Update Leaderboard

on:
  repository_dispatch:
    types: [submit-score]

# Impedisce conflitti di git push se più utenti inviano punteggi contemporaneamente.
# Mette in coda i job (cancel-in-progress: false è il default, che va bene qui).
concurrency:
  group: leaderboard-update

permissions:
  contents: write

jobs:
  update-score:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Update Leaderboard JSON
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          python3 -c "
          import json, os
          
          # Carica dati evento
          try:
              payload = json.loads(os.environ['PAYLOAD'])
              print(f'Processing score for: {payload.get(\"username\")}')
          except Exception as e:
              print(f'Error reading payload: {e}')
              exit(1)
          
          file_path = 'leaderboard.json'
          
          # Carica o crea classifica esistente
          leaderboard = []
          if os.path.exists(file_path):
              try:
                  with open(file_path, 'r', encoding='utf-8') as f:
                      leaderboard = json.load(f)
              except:
                  leaderboard = []

          # Aggiungi nuovo punteggio
          # NOTA: Il 'rank' viene calcolato dopo l'ordinamento
          new_entry = {
              'name': payload.get('username'),
              'score': payload.get('score'),
              'level': payload.get('level'),
              'time': payload.get('time')
          }
          leaderboard.append(new_entry)
          
          # Funzione helper sicura per lo score
          def safe_score(item):
              try:
                  return int(item.get('score', 0))
              except:
                  return 0

          # Ordina per Score decrescente (allineato con la logica dell'App: Level alto + Tempo basso)
          leaderboard.sort(key=safe_score, reverse=True)
          
          # NESSUNA DEDUPLICAZIONE: Accettiamo omonimi e miglioramenti dello stesso utente.
          
          # Tieni Top 100
          leaderboard = leaderboard[:100]
          
          # --- ASSEGNAZIONE RANK ---
          # Calcola la posizione (1, 2, 3...) e salvala nel JSON per l'HTML
          for i, entry in enumerate(leaderboard):
              entry['rank'] = i + 1

          with open(file_path, 'w', encoding='utf-8') as f:
              json.dump(leaderboard, f, indent=4, ensure_ascii=False)
          "

      - name: Commit and Push if Changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add leaderboard.json
          
          # Solo se ci sono cambiamenti, fai commit e push
          if ! git diff --staged --quiet; then
            git commit -m "Update leaderboard: ${{ github.event.client_payload.username }}"
            git pull --rebase
            git push
          else
            echo "No changes to commit."
          fi
