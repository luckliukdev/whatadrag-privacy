name: Update Leaderboard

on:
  repository_dispatch:
    types: [submit-score]

permissions:
  contents: write

jobs:
  update-score:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Update Leaderboard JSON
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          python3 -c "
          import json, os

          def safe_int(value, default=0):
              try:
                  return int(value)
              except:
                  return default

          def safe_time_sec(time_str):
              if not isinstance(time_str, str):
                  return 999999
              parts = time_str.split(':')
              if len(parts) != 2:
                  return 999999
              try:
                  m = int(parts[0])
                  s = int(parts[1])
                  return m * 60 + s
              except:
                  return 999999

          # Carica dati evento
          try:
              payload = json.loads(os.environ['PAYLOAD'])
              username = str(payload.get('username', '')).strip()
              if not username:
                  raise ValueError('username vuoto o mancante')
              print(f'Processing score for: {username}')
          except Exception as e:
              print(f'Error reading payload: {e}')
              exit(1)

          file_path = 'leaderboard.json'

          # Carica o crea classifica esistente
          leaderboard = []
          if os.path.exists(file_path):
              try:
                  with open(file_path, 'r', encoding='utf-8') as f:
                      leaderboard = json.load(f)
                      if isinstance(leaderboard, dict):
                          leaderboard = leaderboard.get('players', [])
                      if not isinstance(leaderboard, list):
                          leaderboard = []
              except Exception as e:
                  print(f'Warning reading existing leaderboard: {e}')
                  leaderboard = []

          # Aggiungi nuovo punteggio
          level = safe_int(payload.get('level'), 0)
          score = safe_int(payload.get('score'), 0)
          time_str = payload.get('time', '99:99')
          if not isinstance(time_str, str):
              time_str = '99:99'

          new_entry = {
              'name': username,
              'score': score,
              'level': level,
              'time': time_str
          }
          leaderboard.append(new_entry)

          # Ordina per livello (desc), tempo (asc), score (desc)
          leaderboard.sort(
              key=lambda item: (
                  -safe_int(item.get('level', 0)),
                  safe_time_sec(item.get('time', '99:99')),
                  -safe_int(item.get('score', 0))
              )
          )

          # Deduplica mantenendo il miglior risultato per utente
          unique_leaderboard = []
          seen_users = set()
          for entry in leaderboard:
              normalized_name = str(entry.get('name', '')).strip().lower()
              if not normalized_name:
                  continue
              if normalized_name not in seen_users:
                  seen_users.add(normalized_name)
                  unique_leaderboard.append(entry)

          leaderboard = unique_leaderboard
          leaderboard = leaderboard[:100]

          # Assegna rank progressivo
          for i, entry in enumerate(leaderboard):
              entry['rank'] = i + 1

          with open(file_path, 'w', encoding='utf-8') as f:
              json.dump(leaderboard, f, indent=4, ensure_ascii=False)
          "

      - name: Commit and Push if Changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add leaderboard.json
          if ! git diff --staged --quiet; then
            git commit -m \"Update leaderboard: ${{ github.event.client_payload.username }}\"
            git push
          else
            echo \"No changes to commit.\"
          fi